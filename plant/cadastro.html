<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/cadastro.css">

    <title>Cadastro </title>


</head>

<body>

    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="row shadow-lg rounded overflow-hidden" style="max-width: 900px;">

            <!--  lado esquerdo  -->
            <div class="col-md-6 d-flex flex-column justify-content-center align-items-center lado-info p-4">
                <h1> Bem-vindo</h1>
                <p class="text-center">
                    Cuide das suas plantas com facilidade! <br>
                    Receba dicas e mantenha seu jardim sempre bonito.
                </p>
            </div>

            <!-- o lado direito-->
            <div class="col-md-6 bg-white">
                <div class="card-cadastro">

                    <h2 class="text-center text-success mb-4">Cadastro</h2>

                    <form id="formulario">

                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" id="Nome" class="form-control" placeholder="Digite seu nome">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <input type="text" id="usuario" class="form-control" placeholder="Digite seu usuário">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirmar senha</label>
                            <input type="password" id="confirmarSenha" class="form-control"
                                placeholder="Confirme sua senha">
                        </div>

                        <button type="submit" class="btn btn-success">Cadastrar</button>
                    </form>

                    <div class="text-center mt-3">
                        <small>Já possui conta? <a href="login.html">Entrar</a></small>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="Js/cadastro.js"></script>


</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Cadastre-se no flower</title>
</head>

<body>

    <section class="td">

        <img src="img/folhas.png" alt="">

        <section class="conteudo">
             <h1>Bem-vindo🌺</h1>

            <p>Cuide das suas plantas com facilidade! 🌱
Encontre dicas, lembretes e tudo o que precisa para manter seu jardim sempre bonito.
            </p>
        </section>


    </section>


    <section class="cadastro">
        <form class="formulario" id="formulario">



            <h1>Cadastro</h1>

            <div class="sla">

                

                <p>Nome</p>
                <input type="text" id="Nome" placeholder="Digite seu nome">



                <p>Usuário</p>
                <input type="text" id="usuario" placeholder="Digite seu usuário">

                <p>Senha</p>
                <input type="password" id="senha" placeholder="Digite sua senha">

                <p>Verifique</p>
                <input type="password" id="confirmarSenha" placeholder="Verifique sua senha">


            </div>
            <div class=" button-cadas">
                <p>Esqueceu a senha?</p>
                <button>Cadastrar</button>
            </div>

        </form>




        <a href="login.html" id="irlogin" class="ja">
            <p>Já possui conta?</p>
        </a>

    </section>



    <script src="Js/script.js"></script>





</body>

</html>
